name: Build Linux x86_64 Binary

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux-x86_64:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build binary
        run: make OS=linux ARCH=x86_64

      - name: Prepare artifacts
        run: |
          mkdir -p dist
          cp build/linux-x86_64/check_ptr_validname dist/check_ptr_validname-linux-x86_64
          sha256sum dist/check_ptr_validname-linux-x86_64 > dist/check_ptr_validname-linux-x86_64.sha256

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: check_ptr_validname-linux-x86_64
          path: dist/*

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/check_ptr_validname-linux-x86_64
            dist/check_ptr_validname-linux-x86_64.sha256
          generate_release_notes: true
